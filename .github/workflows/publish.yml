name: Publish to crates.io

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    name: Publish
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Run tests
        run: cargo test --workspace

      # Publish in dependency order — each crate needs its dependencies on crates.io first.
      # Skips already-published crates (safe for rerun).
      # On rate limit (429), parses the "try again after" timestamp and waits.
      - name: Publish all crates
        run: |
          PUBLISHED=false

          wait_for_rate_limit() {
            local output=$1
            local retry_after
            retry_after=$(echo "$output" | grep -oP 'try again after \K[^"]+(?= and)')
            if [ -n "$retry_after" ]; then
              local target_epoch
              target_epoch=$(date -d "$retry_after" +%s 2>/dev/null) || return 1
              local now_epoch
              now_epoch=$(date +%s)
              local wait_secs=$(( target_epoch - now_epoch + 5 ))
              if [ $wait_secs -gt 0 ] && [ $wait_secs -lt 900 ]; then
                echo "Rate limited. Waiting ${wait_secs}s until $retry_after..."
                sleep $wait_secs
                return 0
              fi
            fi
            return 1
          }

          publish_crate() {
            local crate=$1
            local max_retries=5
            local retry=0
            PUBLISHED=false
            while [ $retry -lt $max_retries ]; do
              echo "Publishing $crate (attempt $((retry + 1))/$max_retries)..."
              local output
              output=$(cargo publish -p "$crate" 2>&1) && {
                echo "$crate published successfully"
                PUBLISHED=true
                return 0
              }
              echo "$output"
              if echo "$output" | grep -qE "already (uploaded|exists)"; then
                echo "$crate already published, skipping"
                return 0
              fi
              retry=$((retry + 1))
              if [ $retry -lt $max_retries ]; then
                if ! wait_for_rate_limit "$output"; then
                  local wait=$((60 * retry))
                  echo "Waiting ${wait}s before retry..."
                  sleep $wait
                fi
              fi
            done
            echo "Failed to publish $crate after $max_retries attempts"
            return 1
          }

          CRATES=(
            rigsql-core
            rigsql-lexer
            rigsql-parser
            rigsql-dialects
            rigsql-rules
            rigsql-config
            rigsql-output
            rigsql-cli
          )

          for crate in "${CRATES[@]}"; do
            publish_crate "$crate"
            if [ "$PUBLISHED" = true ]; then
              sleep 60
            fi
          done
