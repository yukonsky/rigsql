name: Publish to crates.io

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    name: Publish
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Run tests
        run: cargo test --workspace

      # Publish in dependency order — each crate needs its dependencies on crates.io first.
      # Skips already-published crates (safe for rerun). Retries on rate limits.
      - name: Publish all crates
        run: |
          publish_crate() {
            local crate=$1
            local max_retries=5
            local retry=0
            while [ $retry -lt $max_retries ]; do
              echo "Publishing $crate (attempt $((retry + 1))/$max_retries)..."
              local output
              output=$(cargo publish -p "$crate" 2>&1) && {
                echo "$crate published successfully"
                return 0
              }
              echo "$output"
              # Already published — skip
              if echo "$output" | grep -q "already uploaded"; then
                echo "$crate already published, skipping"
                return 0
              fi
              retry=$((retry + 1))
              if [ $retry -lt $max_retries ]; then
                local wait=$((60 * retry))
                echo "Rate limited or error, waiting ${wait}s before retry..."
                sleep $wait
              fi
            done
            echo "Failed to publish $crate after $max_retries attempts"
            return 1
          }

          CRATES=(
            rigsql-core
            rigsql-lexer
            rigsql-parser
            rigsql-dialects
            rigsql-rules
            rigsql-config
            rigsql-output
            rigsql-cli
          )

          for crate in "${CRATES[@]}"; do
            publish_crate "$crate"
            sleep 60
          done
