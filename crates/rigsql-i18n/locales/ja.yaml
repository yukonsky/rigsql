_version: 1

# ── ルール説明 ────────────────────────────────────────────────────────────
rules.LT01.description: "不適切なスペースが見つかりました。"
rules.LT01.explanation: "SQLではキーワードと式の間に単一スペースを使用すべきです。インデント以外の連続スペースは可読性を低下させます。演算子の両側にはスペースが必要です。"
rules.LT02.description: "インデントが正しくありません。"
rules.LT02.explanation: "SQLでは一貫したインデントを使用すべきです。各インデントレベルは同じ数のスペース（デフォルト4）を使用し、タブとスペースを混在させないでください。"
rules.LT03.description: "演算子の両側にスペースが必要です。"
rules.LT03.explanation: "二項演算子（=, <, >, +, - など）は可読性のために両側に単一スペースが必要です。'a=b' や 'a  = b' は 'a = b' より読みにくくなります。"
rules.LT04.description: "カンマは行末に配置してください。"
rules.LT04.explanation: "SELECT句やGROUP BYなどのカンマは、行末（トレーリング）または次の行の先頭（リーディング）に統一すべきです。混在すると可読性が低下します。"
rules.LT05.description: "行が長すぎます。"
rules.LT05.explanation: "長い行は読みにくく、レビューしづらくなります。設定された最大長（デフォルト80文字）以下に抑え、長いクエリは複数行に分割してください。"
rules.LT06.description: "関数名の直後に括弧がありません。"
rules.LT06.explanation: "SQLでは関数呼び出しの開き括弧は関数名の直後に配置し、間にスペースを入れないでください。例：COUNT (*) ではなく COUNT(*) と記述します。"
rules.LT07.description: "WITH句の閉じ括弧は新しい行に配置してください。"
rules.LT07.explanation: "CTEの閉じ括弧はCTE本体の最後の式と同じ行ではなく、独立した行に配置すべきです。"
rules.LT08.description: "CTE定義の前に空行が必要です。"
rules.LT08.explanation: "WITH句に複数のCTEがある場合、最初以降の各CTEは空行で区切るべきです。CTE間に改行が1つだけだと、区切りが分かりにくくなります。"
rules.LT09.description: "SELECT対象が1つでない場合は新しい行に配置してください。"
rules.LT09.explanation: "SELECTに複数のカラムがある場合、各カラムは独立した行に配置すべきです。差分がきれいになり、可読性が向上します。単一カラムはSELECTと同じ行で構いません。"
rules.LT10.description: "SELECT修飾子（DISTINCT, ALL）はSELECTと同じ行に配置してください。"
rules.LT10.explanation: "DISTINCTやALLなどのSELECT修飾子はSELECTキーワードと同じ行に記述すべきです。別の行に配置すると混乱を招き、可読性が低下します。"
rules.LT11.description: "集合演算子の前後に改行が必要です。"
rules.LT11.explanation: "UNION、INTERSECT、EXCEPTなどの集合演算子は複数のクエリ結果を結合します。個々のクエリを視覚的に区別するために、前後に改行を入れるべきです。"
rules.LT12.description: "ファイルは末尾に1つの改行で終わる必要があります。"
rules.LT12.explanation: "ファイルの末尾にはちょうど1つの改行文字が必要です。末尾の改行がないと一部のツールで問題が発生し、複数の改行は不要です。"
rules.LT13.description: "ファイルの先頭に改行や空白があってはなりません。"
rules.LT13.explanation: "ファイルは実際の内容で始まるべきで、空行や空白で始まるべきではありません。先頭の空白は意図しないものである可能性が高く、削除すべきです。"
rules.LT14.description: "キーワード句は改行の前後の規則に従うべきです。"
rules.LT14.explanation: "主要なSQL句（FROM、WHERE、GROUP BY、HAVING、ORDER BY、LIMIT）は可読性のために新しい行で開始すべきです。前の句と同じ行に配置するとクエリが読みにくくなります。"
rules.LT15.description: "連続する空行が多すぎます。"
rules.LT15.explanation: "ファイルに連続する空行が多すぎてはなりません。複数の空行は縦方向のスペースを無駄にし、可読性を低下させます。"

rules.CP01.description: "キーワードの大文字小文字が統一されていません。"
rules.CP01.explanation: "SELECT、FROM、WHEREなどのSQLキーワードは統一された大文字小文字を使用すべきです。混在は可読性を低下させます。多くのスタイルガイドでは識別子と区別するためにキーワードを大文字にすることを推奨しています。"
rules.CP02.description: "引用符なし識別子の大文字小文字が統一されていません。"
rules.CP02.explanation: "引用符なし識別子（テーブル名、カラム名）は統一された大文字小文字を使用すべきです。多くのSQLスタイルガイドでは lower_snake_case を推奨しています。"
rules.CP03.description: "関数名の大文字小文字が統一されていません。"
rules.CP03.explanation: "COUNT、SUM、COALESCEなどの関数名は統一された大文字小文字を使用すべきです。大文字・小文字のどちらにするかはチームの慣例に従います。"
rules.CP04.description: "ブール/NULLリテラルの大文字小文字が統一されていません。"
rules.CP04.explanation: "ブールリテラル（TRUE、FALSE）とNULLは統一された大文字小文字を使用すべきです。これらのリテラルに大文字を使用するのが最も一般的な慣例で、可読性が向上します。"
rules.CP05.description: "データ型名の大文字小文字が統一されていません。"
rules.CP05.explanation: "データ型名（INT、VARCHAR、TEXTなど）は統一された大文字小文字を使用すべきです。多くのスタイルガイドではカラム名と区別するためにデータ型を大文字にすることを推奨しています。"

rules.CV01.description: "不等号演算子を統一してください。"
rules.CV01.explanation: "SQLには2つの不等号演算子があります：'!=' と '<>'。一方に統一することで可読性が向上します。ANSI標準では '<>' ですが、'!=' のほうがモダンなSQLでは一般的です。"
rules.CV02.description: "IFNULLやNVLの代わりにCOALESCEを使用してください。"
rules.CV02.explanation: "COALESCEはNULL値処理のANSI SQL標準関数です。IFNULL（MySQL）やNVL（Oracle）はデータベース固有の代替手段です。COALESCEを使用することで移植性と一貫性が向上します。"
rules.CV03.description: "SELECT句に余分なカンマがあります。"
rules.CV03.explanation: "SELECTのカラムリストの末尾（FROMの前または文の終わり）にある余分なカンマは、ほとんどのSQLデータベースで構文エラーになります。不要なカンマを削除してください。"
rules.CV04.description: "全行カウントには一貫した構文を使用してください。"
rules.CV04.explanation: "COUNT(*)は全行をカウントする標準的で最も読みやすい方法です。COUNT(1)やCOUNT(0)は同じ結果を返しますが、意図が不明確です。COUNT(*)を一貫して使用することでコードが読みやすくなります。"
rules.CV05.description: "NULLとの比較にはISまたはIS NOTを使用してください。"
rules.CV05.explanation: "SQLではNULLは値ではなく、値の不在を表します。比較演算子（=、!=、<>）とNULLの比較は常にNULL（偽）を返します。'= NULL'や'!= NULL'の代わりに'IS NULL'または'IS NOT NULL'を使用してください。"
rules.CV06.description: "文はセミコロンで終わる必要があります。"
rules.CV06.explanation: "すべてのSQL文はセミコロンで終了すべきです。一部のデータベースはセミコロンなしでも受け付けますが、移植性と明確性のためにセミコロンを付けることが良い慣例です。"
rules.CV07.description: "トップレベルの文を括弧で囲むべきではありません。"
rules.CV07.explanation: "文全体を括弧で囲むことは不要であり、混乱を招く可能性があります。可読性を向上させるために外側の括弧を削除してください。"
rules.CV08.description: "RIGHT JOINの代わりにLEFT JOINを使用してください。"
rules.CV08.explanation: "RIGHT JOINはテーブルの順序を入れ替えることで常にLEFT JOINに書き換えられます。LEFT JOINは左から右に読めるため直感的です：「主テーブル」が左、「任意テーブル」が右になります。"
rules.CV09.description: "禁止されたワードが使用されています。"
rules.CV09.explanation: "特定の単語は予約語であったり、非推奨であったり、チームの慣例で使用禁止になっている場合があります。このルールは設定可能な禁止ワードリストに一致する識別子を検出します。"
rules.CV10.description: "文字列リテラルの引用符を統一してください。"
rules.CV10.explanation: "文字列リテラルは一貫した引用符スタイルを使用すべきです。デフォルトでは、ANSI SQL標準の文字列リテラルであるシングルクォートが推奨されます。"
rules.CV11.description: "型キャストのスタイルを統一してください。"
rules.CV11.explanation: "SQLには複数の型キャスト方法があります：CAST(x AS type)、x::type、CONVERT()。一貫したスタイルを使用することで可読性が向上します。デフォルトではANSI CAST()構文が推奨されます。"
rules.CV12.description: "暗黙的なJOINの代わりにJOIN … ON …を使用してください。"
rules.CV12.explanation: "FROMでカンマ区切りのテーブルとWHEREでの結合条件（暗黙的JOIN）を使用すると、結合ロジックとフィルタリングが混在します。明示的なJOIN … ON …構文で結合条件とフィルタ条件を分離し、可読性と保守性を向上させてください。"

rules.AL01.description: "テーブル/カラムの暗黙的なエイリアスは許可されていません。"
rules.AL01.explanation: "エイリアスは明確性のために明示的なASキーワードを使用すべきです。'SELECT a alias_name' は 'SELECT a AS alias_name' より読みにくくなります。明示的なエイリアスは意図を明確にし、曖昧さを防ぎます。"
rules.AL02.description: "カラムの暗黙的なエイリアスは許可されていません。"
rules.AL02.explanation: "カラムエイリアスは明示的なASキーワードを使用すべきです。'SELECT col alias' は 'SELECT col AS alias' より読みにくくなります。複雑な式では特に重要です。"
rules.AL03.description: "エイリアスのないカラム式です。明示的なエイリアスを使用してください。"
rules.AL03.explanation: "SELECTの複雑な式にはASを使用した明示的なエイリアスが必要です。'SELECT a + b FROM t' は 'SELECT a + b AS total FROM t' より扱いにくくなります。結果セットが自己文書化されます。"
rules.AL04.description: "テーブルエイリアスは文内で一意である必要があります。"
rules.AL04.explanation: "同じエイリアスが単一の文内の複数のテーブルに使用されると、カラム参照が曖昧になります。各テーブルエイリアスはそれを含む文内で一意でなければなりません。"
rules.AL05.description: "テーブル/CTEが未使用です。"
rules.AL05.explanation: "WITH句で定義されたすべてのCTE（共通テーブル式）は、メインクエリまたは他のCTEで参照されるべきです。未使用のCTEは利点なく複雑さを増すため、削除すべきです。"
rules.AL06.description: "FROM句とJOIN条件でのテーブルエイリアスの長さを制限します。"
rules.AL06.explanation: "短すぎるテーブルエイリアス（1文字など）は分かりにくくなります。長すぎるエイリアスはエイリアスの目的に反します。min_alias_lengthとmax_alias_lengthを設定してチームの基準を適用してください。"
rules.AL07.description: "FROM句とJOIN条件でのテーブルエイリアスを避けてください。"
rules.AL07.explanation: "テーブルエイリアス（特に頭文字語）は可読性を低下させる可能性があります。完全なテーブル名を使用すると、各カラムの出所が明確になります。このルールはデフォルトで無効です。"
rules.AL08.description: "カラムエイリアスは各文内で一意である必要があります。"
rules.AL08.explanation: "同じエイリアスが単一のSELECT句の複数のカラムに使用されると、結果セットが曖昧になります。各カラムエイリアスはそれを含むSELECT句内で一意でなければなりません。"
rules.AL09.description: "カラムの自己エイリアスは冗長です。"
rules.AL09.explanation: "`col AS col` や `table.col AS col` のようにカラムを自身の名前でエイリアスすることは冗長です。"

rules.AM01.description: "DISTINCTとGROUP BYが併用されています。"
rules.AM01.explanation: "DISTINCTとGROUP BYの併用は冗長です。GROUP BYはすでにグループ化されたカラムに対して結果セットを重複排除します。この組み合わせは曖昧であり、クエリのセマンティクスを完全に理解していない可能性を示唆します。"
rules.AM02.description: "UNIONにDISTINCTまたはALLが指定されていません。"
rules.AM02.explanation: "修飾子なしのUNIONは暗黙的に結果を重複排除し、UNION DISTINCTと同等です。この暗黙的な動作は混乱を招く可能性があります。すべての行が必要な場合はUNION ALLを、重複排除を明示する場合はUNION DISTINCTを使用してください。"
rules.AM03.description: "ORDER BYの方向指定が不統一です。"
rules.AM03.explanation: "ORDER BY句に複数のカラムがある場合、明示的な方向（ASC/DESC）と暗黙的な方向を混在させると混乱します。一部のカラムに明示的な方向がある場合、一貫性と明確性のためにすべてのカラムに方向を指定すべきです。"
rules.AM04.description: "SELECT * の代わりにカラムを明示的に列挙してください。"
rules.AM04.explanation: "SELECT * を使用するとクエリのカラムセットがテーブルスキーマに依存し、時間とともに変更される可能性があります。カラムを明示的に列挙することでクエリが自己文書化され、カラムの追加・削除による予期しない変更を防ぎます。"
rules.AM05.description: "修飾子なしのJOINです。"
rules.AM05.explanation: "修飾子なしのJOINキーワード（INNER、LEFT、RIGHT、FULL、CROSS、NATURAL）は暗黙的にINNER JOINを意味します。結合タイプを明示することで可読性が向上し、クエリの意図が明確になります。"
rules.AM06.description: "GROUP BY/ORDER BYでのカラム参照が不統一です。"
rules.AM06.explanation: "GROUP BYとORDER BY句ではカラム参照のスタイルを統一すべきです：すべて位置指定（例：GROUP BY 1, 2）またはすべて明示的なカラム名（例：GROUP BY foo, bar）。GROUP BY foo, 2 のようなスタイルの混在は曖昧で保守が困難です。"
rules.AM07.description: "集合演算のカラム数が不一致です。"
rules.AM07.explanation: "UNION、INTERSECT、EXCEPT演算は各ブランチが同じ数のカラムを持つ必要があります。不一致はほとんどのデータベースで実行時エラーを引き起こします。このルールは各ブランチのSELECT項目数の一貫性を確認します。"
rules.AM08.description: "FROM句での暗黙的なクロスジョインです。"
rules.AM08.explanation: "FROM句でカンマを使用してテーブルを区切ると暗黙的なクロスジョイン（直積）が作成されます。明示的なCROSS JOIN構文を使用するか、異なる結合タイプを意図する場合は適切なJOIN ... ON句を使用してください。"
rules.AM09.description: "ORDER BYなしのLIMITです。"
rules.AM09.explanation: "ORDER BYなしのLIMITは非決定的な結果を生成します。データベースは任意の順序で行を返す可能性があるためです。予測可能で再現性のある結果セットを得るために、常にLIMITとORDER BYを組み合わせてください。"

rules.RF01.description: "FROM句にないオブジェクトを参照しています。"
rules.RF01.explanation: "SELECT、WHERE、GROUP BYなどの句で使用されるテーブルまたはエイリアス修飾子は、FROMまたはJOIN句で宣言されたテーブルまたはエイリアスに対応する必要があります。FROMに'foo'のみがある場合に'vee.a'のような未宣言のエイリアスを参照するのはエラーです。"
rules.RF02.description: "複数テーブル参照時はカラムを修飾してください。"
rules.RF02.explanation: "クエリが複数のテーブルを参照する場合（FROMおよびJOIN句経由）、すべてのカラム参照にテーブル名またはエイリアスを修飾すべきです（例：'id' ではなく 'users.id'）。曖昧さを防ぎ、可読性を向上させます。"
rules.RF03.description: "カラム修飾を統一してください。"
rules.RF03.explanation: "単一のSELECT文内でカラム参照は一貫して修飾するか非修飾にすべきです。スタイルの混在（例：'users.id' と裸の 'name'）は可読性を低下させ、意図しない省略を示す可能性があります。"
rules.RF04.description: "キーワードを識別子として使用しないでください。"
rules.RF04.explanation: "SQL予約語を識別子（カラム名、テーブル名、エイリアス）として使用すると、構文解析の曖昧さを引き起こし、読者を混乱させ、SQLダイアレクト間の移植性を低下させます。説明的で予約されていない名前を使用してください。"
rules.RF05.description: "識別子に特殊文字を含めないでください。"
rules.RF05.explanation: "裸の識別子には英数字とアンダースコアのみを含めるべきです。識別子の特殊文字（スペース、ハイフンなど）は引用符が必要であり、移植性の問題を引き起こす可能性があります。特殊文字が必要な場合は明示的に引用符付き識別子を使用してください。"
rules.RF06.description: "識別子への不要な引用符です。"
rules.RF06.explanation: "英数字とアンダースコアのみを含み、文字またはアンダースコアで始まる引用符付き識別子は引用符が不要です。不要な引用符を削除すると可読性が向上します。引用符は本当に必要な識別子（予約語、スペース、特殊文字など）にのみ使用してください。"

rules.ST01.description: "CASE式での冗長なELSE NULLを指定しないでください。"
rules.ST01.explanation: "ELSE句のないCASE式は暗黙的にNULLを返します。したがってELSE NULLは冗長であり、クエリに不要なノイズを加えます。明確性のためにELSE NULL句を削除してください。"
rules.ST02.description: "不要なCASE式です。"
rules.ST02.explanation: "CASE式がより単純な構文に置き換えられる場合は不要です：(1) TRUE/FALSE（または1/0）を返す単一のWHENと逆のELSEは条件をそのまま使用できます。(2) CASE WHEN x IS NULL THEN y ELSE x END は COALESCE(x, y) に置き換えられます。"
rules.ST03.description: "CTEが定義されていますが使用されていません。"
rules.ST03.explanation: "WITH句で定義されたすべてのCTE（共通テーブル式）はメインクエリまたは他のCTEで参照されるべきです。未使用のCTEは利点なく複雑さを増すため、削除すべきです。"
rules.ST04.description: "ネストされたCASE式は避けてください。"
rules.ST04.explanation: "ネストされたCASE式はSQLクエリの可読性と保守性を低下させます。CTEやサブクエリ、または別のカラムを使用してロジックをリファクタリングし、可読性を向上させてください。"
rules.ST05.description: "派生テーブルの代わりにCTEを使用してください。"
rules.ST05.explanation: "FROM句のサブクエリ（派生テーブル）は共通テーブル式（CTE）と比較して可読性が低下します。派生テーブルをWITH句で定義されたCTEにリファクタリングすることを検討してください。"
rules.ST06.description: "SELECTカラムの順序規則です。"
rules.ST06.explanation: "SELECT句のカラムは一貫した順序規則に従うべきです。例えば、ワイルドカードと単純カラムを集約関数やウィンドウ関数より前に配置します。このルールは現在スタブであり、違反を生成しません。"
rules.ST07.description: "JOINではUSING句よりも明示的なON句を推奨します。"
rules.ST07.explanation: "JOINのUSING句は同じ名前のカラムをマッチさせる省略形です。簡潔ですが、明示的なON句より不明確になる可能性があります。ONを使用すると結合条件が明示的になり、潜在的な曖昧さを避けられます。"
rules.ST08.description: "括弧付きのDISTINCTは誤解を招きます。"
rules.ST08.explanation: "DISTINCTはSELECT結果セット全体に適用されるキーワードであり、関数ではありません。SELECT DISTINCT(col) と記述するとDISTINCTが単一カラムに対して関数のように動作するように見え、誤解を招きます。SELECT DISTINCT col を使用してください。"
rules.ST09.description: "JOIN条件のカラム順序規則です。"
rules.ST09.explanation: "JOIN ... ON句では、結合されるテーブルのカラムが一貫性と可読性のために比較の左側に表示されるべきです。このルールは現在スタブであり、違反を生成しません。"
rules.ST10.description: "WHERE句に定数/トートロジー式が含まれています。"
rules.ST10.explanation: "WHERE 1 = 1 や WHERE TRUE のような定数式を含むWHERE句は、削除すべきプレースホルダーであるか、デッドコードを示しています。WHERE句を削除するか、意味のある条件に置き換えてください。"
rules.ST11.description: "結合されたテーブルがクエリで参照されていません。"
rules.ST11.explanation: "結合されたがSELECT、WHERE、その他の句で参照されていないテーブルは不要な可能性があります。未使用の結合を削除してクエリを簡素化し、パフォーマンスを向上させてください。このルールは現在スタブです。"
rules.ST12.description: "連続するセミコロンは空の文を示します。"
rules.ST12.explanation: "空白のみを挟んだ複数の連続するセミコロンは空の文を示しており、意図しないものである可能性が高いです。余分なセミコロンを削除してください。"

rules.RG02.description: "UNIONでのNULLの使用を統一してください。"
rules.RG02.explanation: "UNIONクエリでNULLを使用する場合、NULLカラムの型が曖昧になります。"
rules.RG03.description: "BETWEEN演算子の使用です。"
rules.RG03.explanation: "BETWEEN演算子は両端を含むため、特に日付/時刻範囲で微妙なバグを引き起こす可能性があります。より明確な境界セマンティクスのために >= と < の使用を検討してください。"
rules.RG04.description: "GROUP BYなしのHAVINGが使用されています。"
rules.RG04.explanation: "HAVINGはグループ化された結果をフィルタリングするために設計されています。GROUP BYなしのHAVINGは結果全体を単一グループとしてフィルタリングするため、混乱を招きます。グループ化されていないフィルタリングにはWHEREを使用してください。"
rules.RG05.description: "FROM句のサブクエリにはエイリアスが必要です。"
rules.RG05.explanation: "FROM句またはJOIN句でサブクエリをテーブルソースとして使用する場合、可読性のため、またそのカラムを参照できるようにするために、エイリアスを付けるべきです。"

rules.TQ01.description: "ストアドプロシージャにsp_プレフィックスを使用しないでください。"
rules.TQ01.explanation: "sp_プレフィックスのストアドプロシージャはSQL Serverが最初にmasterデータベースを検索するため、パフォーマンスオーバーヘッドと名前の衝突を引き起こす可能性があります。別のプレフィックスを使用してください。"
rules.TQ02.description: "IF/WHILEブロックには複数文の本体にBEGIN...ENDを使用してください。"
rules.TQ02.explanation: "T-SQLではBEGIN...ENDなしのIFおよびWHILEは直後の文のみを実行します。文を追加する際に微妙なバグを引き起こす可能性があります。明確性のために常にBEGIN...ENDを使用してください。"
rules.TQ03.description: "空のバッチ（連続するGO文）を避けてください。"
rules.TQ03.explanation: "T-SQLではGOはバッチセパレータです。間に何もない2つの連続するGO文は空のバッチを作成し、意図しないものである可能性が高いです。"

