_version: 1

# ── Rule descriptions ────────────────────────────────────────────────────
rules.LT01.description: "Inappropriate spacing found."
rules.LT01.explanation: "SQL should use single spaces between keywords and expressions. Multiple consecutive spaces (except for indentation) reduce readability. Operators should have spaces on both sides."
rules.LT02.description: "Incorrect indentation."
rules.LT02.explanation: "SQL should use consistent indentation. Each indentation level should use the same number of spaces (default 4). Tabs should not be mixed with spaces."
rules.LT03.description: "Operators should be surrounded by single spaces."
rules.LT03.explanation: "Binary operators (=, <, >, +, -, etc.) should have a single space on each side for readability. 'a=b' and 'a  = b' are harder to read than 'a = b'."
rules.LT04.description: "Commas should be at the end of the line, not the start."
rules.LT04.explanation: "Commas in SELECT lists, GROUP BY, and other clauses should consistently appear at the end of the line (trailing) or the start of the next line (leading). Mixing styles reduces readability."
rules.LT05.description: "Line too long."
rules.LT05.explanation: "Long lines are harder to read and review. Keep lines under the configured maximum length (default 80 characters). Break long queries across multiple lines."
rules.LT06.description: "Function name not followed immediately by parenthesis."
rules.LT06.explanation: "In SQL, function calls should have the opening parenthesis immediately after the function name with no intervening whitespace. For example, write COUNT(*) rather than COUNT (*)."
rules.LT07.description: "WITH clause closing bracket should be on a new line."
rules.LT07.explanation: "The closing parenthesis of a CTE definition should be placed on its own line, not on the same line as the last expression in the CTE body."
rules.LT08.description: "Blank line expected but not found before CTE definition."
rules.LT08.explanation: "When a WITH clause contains multiple CTEs, each CTE after the first should be separated by a blank line to improve readability. A single newline between CTEs makes it harder to distinguish where one ends and the next begins."
rules.LT09.description: "Select targets should be on a new line unless there is only one."
rules.LT09.explanation: "When a SELECT has multiple columns, each column should be on its own line. This makes diffs cleaner and improves readability. A single column can stay on the same line as SELECT."
rules.LT10.description: "SELECT modifiers (DISTINCT, ALL) must be on same line as SELECT."
rules.LT10.explanation: "SELECT modifiers such as DISTINCT or ALL should appear on the same line as the SELECT keyword. Placing them on a separate line is confusing and reduces readability."
rules.LT11.description: "Set operators should be surrounded by newlines."
rules.LT11.explanation: "Set operators such as UNION, INTERSECT, and EXCEPT combine the results of multiple queries. They should be surrounded by newlines to visually separate the individual queries and improve readability."
rules.LT12.description: "Files must end with a single trailing newline."
rules.LT12.explanation: "Files should end with exactly one newline character. Missing trailing newlines can cause issues with some tools, and multiple trailing newlines are untidy."
rules.LT13.description: "Files must not begin with newlines or whitespace."
rules.LT13.explanation: "Files should start with actual content, not blank lines or whitespace. Leading whitespace is likely unintentional and should be removed."
rules.LT14.description: "Keyword clauses should follow a standard for being before/after newlines."
rules.LT14.explanation: "Major SQL clauses (FROM, WHERE, GROUP BY, HAVING, ORDER BY, LIMIT) should start on a new line for readability. Placing them on the same line as the previous clause makes the query harder to scan."
rules.LT15.description: "Too many consecutive blank lines."
rules.LT15.explanation: "Files should not contain too many consecutive blank lines. Multiple blank lines waste vertical space and reduce readability."

rules.CP01.description: "Keywords must be consistently capitalised."
rules.CP01.explanation: "SQL keywords like SELECT, FROM, WHERE should use consistent capitalisation. Mixed case reduces readability. Most style guides recommend UPPER case keywords to distinguish them from identifiers."
rules.CP02.description: "Unquoted identifiers must be consistently capitalised."
rules.CP02.explanation: "Unquoted identifiers (table names, column names) should use consistent capitalisation. Most SQL style guides recommend lower_snake_case for identifiers."
rules.CP03.description: "Function names must be consistently capitalised."
rules.CP03.explanation: "Function names like COUNT, SUM, COALESCE should be consistently capitalised. Whether upper or lower depends on your team's convention."
rules.CP04.description: "Boolean/Null literals must be consistently capitalised."
rules.CP04.explanation: "Boolean literals (TRUE, FALSE) and NULL should be consistently capitalised. Using UPPER case for these literals is the most common convention and improves readability."
rules.CP05.description: "Data type names must be consistently capitalised."
rules.CP05.explanation: "Data type names (INT, VARCHAR, TEXT, etc.) should use consistent capitalisation. Most style guides recommend upper case for data types to distinguish them from column names."

rules.CV01.description: "Consistent not-equal operator."
rules.CV01.explanation: "SQL has two not-equal operators: '!=' and '<>'. Using one consistently improves readability. The ANSI standard uses '<>' but '!=' is more common in modern SQL and programming."
rules.CV02.description: "Use COALESCE instead of IFNULL or NVL."
rules.CV02.explanation: "COALESCE is the ANSI SQL standard function for handling NULL values. IFNULL (MySQL) and NVL (Oracle) are database-specific alternatives. Using COALESCE improves portability and consistency."
rules.CV03.description: "Trailing comma in SELECT clause."
rules.CV03.explanation: "A trailing comma at the end of a SELECT column list (before FROM or end of statement) is a syntax error in most SQL databases. Remove the extraneous comma."
rules.CV04.description: "Use consistent syntax to count all rows."
rules.CV04.explanation: "COUNT(*) is the standard and most readable way to count all rows. COUNT(1) and COUNT(0) produce the same result but are less clear in intent. Using COUNT(*) consistently makes the code more readable."
rules.CV05.description: "Comparisons with NULL should use IS or IS NOT."
rules.CV05.explanation: "In SQL, NULL is not a value but the absence of one. Comparison operators (=, !=, <>) with NULL always return NULL (which is falsy). Use 'IS NULL' or 'IS NOT NULL' instead of '= NULL' or '!= NULL'."
rules.CV06.description: "Statements must end with a semicolon."
rules.CV06.explanation: "All SQL statements should be terminated with a semicolon. While some databases accept statements without terminators, including them is good practice for portability and clarity."
rules.CV07.description: "Top-level statements should not be wrapped in brackets."
rules.CV07.explanation: "Wrapping an entire statement in parentheses is unnecessary and can be confusing. Remove the outer brackets to improve readability."
rules.CV08.description: "Use LEFT JOIN instead of RIGHT JOIN."
rules.CV08.explanation: "RIGHT JOIN can always be rewritten as LEFT JOIN by swapping the table order. LEFT JOIN is more intuitive because it reads left-to-right: the 'main' table is on the left, and the 'optional' table is on the right."
rules.CV09.description: "Use of blocked words."
rules.CV09.explanation: "Certain words may be reserved, deprecated, or disallowed by team convention. This rule flags identifiers that match a configurable list of blocked words."
rules.CV10.description: "Consistent usage of preferred quotes for quoted literals."
rules.CV10.explanation: "String literals should use a consistent quoting style. By default, single quotes are preferred as they are the ANSI SQL standard for string literals."
rules.CV11.description: "Enforce consistent type casting style."
rules.CV11.explanation: "SQL has multiple ways to cast types: CAST(x AS type), x::type, and CONVERT(). Using a consistent style improves readability. By default, the ANSI CAST() syntax is preferred."
rules.CV12.description: "Use JOIN … ON … instead of implicit join in WHERE."
rules.CV12.explanation: "Using comma-separated tables in FROM with join conditions in WHERE (implicit join) mixes join logic with filtering. Use explicit JOIN … ON … syntax to separate join conditions from filter conditions, improving readability and maintainability."

rules.AL01.description: "Implicit aliasing of table/column is not allowed."
rules.AL01.explanation: "Aliases should use the explicit AS keyword for clarity. 'SELECT a alias_name' is harder to read than 'SELECT a AS alias_name'. Explicit aliasing makes the intent clear and prevents ambiguity."
rules.AL02.description: "Implicit column aliasing is not allowed."
rules.AL02.explanation: "Column aliases should use the explicit AS keyword. 'SELECT col alias' is harder to read than 'SELECT col AS alias'. This is especially important for complex expressions."
rules.AL03.description: "Column expression without alias. Use explicit alias."
rules.AL03.explanation: "Complex expressions in SELECT should have an explicit alias using AS. An unlabeled expression like 'SELECT a + b FROM t' is harder to work with than 'SELECT a + b AS total FROM t'. This makes result sets self-documenting."
rules.AL04.description: "Table aliases should be unique within a statement."
rules.AL04.explanation: "When the same alias is used for multiple tables in a single statement, column references become ambiguous. Each table alias must be unique within its containing statement."
rules.AL05.description: "Tables/CTEs should not be unused."
rules.AL05.explanation: "Every CTE (Common Table Expression) defined in a WITH clause should be referenced in the main query or in another CTE. Unused CTEs add complexity without benefit and should be removed."
rules.AL06.description: "Enforce table alias lengths in FROM clauses and JOIN conditions."
rules.AL06.explanation: "Table aliases that are too short (like single letters) can be cryptic. Aliases that are too long defeat the purpose of aliasing. Configure min_alias_length and max_alias_length to enforce your team's standards."
rules.AL07.description: "Avoid table aliases in FROM clauses and JOIN conditions."
rules.AL07.explanation: "Table aliases can reduce readability, especially initialisms. Using the full table name makes it clear where each column comes from. This rule is disabled by default as it is controversial for larger databases."
rules.AL08.description: "Column aliases should be unique within each statement."
rules.AL08.explanation: "When the same alias is used for multiple columns in a single SELECT clause, the result set becomes ambiguous. Each column alias must be unique within its containing SELECT clause."
rules.AL09.description: "Self-aliasing of columns is redundant."
rules.AL09.explanation: "Writing `col AS col` or `table.col AS col` aliases a column to its own name."

rules.AM01.description: "DISTINCT used with GROUP BY."
rules.AM01.explanation: "Using DISTINCT together with GROUP BY is redundant because GROUP BY already deduplicates the result set for the grouped columns. This combination is ambiguous and suggests the author may not fully understand the query semantics."
rules.AM02.description: "UNION without DISTINCT or ALL."
rules.AM02.explanation: "A bare UNION (without ALL or DISTINCT) implicitly deduplicates results, which is equivalent to UNION DISTINCT. This implicit behavior can be confusing. Use UNION ALL when you want all rows, or UNION DISTINCT to make the dedup explicit."
rules.AM03.description: "Inconsistent ORDER BY direction."
rules.AM03.explanation: "When an ORDER BY clause has multiple columns, mixing explicit (ASC/DESC) and implicit sort directions is confusing. If some columns have an explicit direction, all columns should have one for consistency and clarity."
rules.AM04.description: "SELECT * should list columns explicitly."
rules.AM04.explanation: "Using SELECT * makes the query's column set depend on the table schema, which can change over time. Listing columns explicitly makes the query self-documenting and prevents unexpected changes when columns are added or removed."
rules.AM05.description: "JOIN without qualifier."
rules.AM05.explanation: "A bare JOIN keyword without a qualifier (INNER, LEFT, RIGHT, FULL, CROSS, NATURAL) implicitly means INNER JOIN. Making the join type explicit improves readability and makes the query's intent clear."
rules.AM06.description: "Inconsistent column references in GROUP BY/ORDER BY."
rules.AM06.explanation: "GROUP BY and ORDER BY clauses should use a consistent style for column references: either all positional (e.g., GROUP BY 1, 2) or all explicit column names (e.g., GROUP BY foo, bar). Mixing styles like GROUP BY foo, 2 is ambiguous and hard to maintain."
rules.AM07.description: "Set operation column count mismatch."
rules.AM07.explanation: "UNION, INTERSECT, and EXCEPT operations require each branch to have the same number of columns. A mismatch will cause a runtime error in most databases. This rule checks that each branch has a consistent number of select items."
rules.AM08.description: "Implicit cross join in FROM clause."
rules.AM08.explanation: "Using commas to separate tables in a FROM clause creates an implicit cross join (Cartesian product). Use explicit CROSS JOIN syntax instead, or use appropriate JOIN ... ON clauses if you intend a different join type."
rules.AM09.description: "LIMIT without ORDER BY."
rules.AM09.explanation: "Using LIMIT without ORDER BY produces non-deterministic results because the database is free to return rows in any order. Always pair LIMIT with ORDER BY to get predictable, reproducible result sets."

rules.RF01.description: "References cannot reference objects not present in FROM clause."
rules.RF01.explanation: "Table or alias qualifiers used in SELECT, WHERE, GROUP BY, and other clauses must correspond to a table or alias declared in the FROM or JOIN clauses. Referencing an undeclared alias like 'vee.a' when only 'foo' is in FROM is an error."
rules.RF02.description: "Columns should be qualified when multiple tables are referenced."
rules.RF02.explanation: "When a query references multiple tables (via FROM and JOIN clauses), all column references should be qualified with a table name or alias (e.g., 'users.id' instead of 'id') to prevent ambiguity and improve readability."
rules.RF03.description: "Column qualification should be consistent."
rules.RF03.explanation: "Within a single SELECT statement, column references should be consistently qualified or unqualified. Mixing styles (e.g., 'users.id' alongside bare 'name') reduces readability and can indicate accidental omissions."
rules.RF04.description: "Keywords should not be used as identifiers."
rules.RF04.explanation: "Using SQL reserved keywords as identifiers (column names, table names, aliases) can cause parsing ambiguity, confuse readers, and reduce portability across SQL dialects. Use descriptive, non-reserved names instead."
rules.RF05.description: "Identifiers should not contain special characters."
rules.RF05.explanation: "Bare identifiers should only contain alphanumeric characters and underscores. Special characters (spaces, hyphens, etc.) in identifiers require quoting and can cause portability issues. If special characters are needed, use quoted identifiers explicitly."
rules.RF06.description: "Unnecessary quoting of identifiers."
rules.RF06.explanation: "Quoted identifiers that contain only alphanumeric characters, underscores, and start with a letter or underscore do not need to be quoted. Removing unnecessary quotes improves readability. Quoting should be reserved for identifiers that genuinely require it (e.g., reserved words, spaces, special characters)."

rules.ST01.description: "Do not specify redundant ELSE NULL in a CASE expression."
rules.ST01.explanation: "A CASE expression without an ELSE clause implicitly returns NULL. Writing ELSE NULL is therefore redundant and adds unnecessary noise to the query. Remove the ELSE NULL clause for clarity."
rules.ST02.description: "Unnecessary CASE expression."
rules.ST02.explanation: "A CASE expression is unnecessary when it can be replaced by a simpler construct: (1) A single WHEN returning TRUE/FALSE (or 1/0) with an opposite ELSE can use the condition directly. (2) A CASE WHEN x IS NULL THEN y ELSE x END can be replaced with COALESCE(x, y)."
rules.ST03.description: "Query defines a CTE but does not use it."
rules.ST03.explanation: "Every CTE (Common Table Expression) defined in a WITH clause should be referenced in the main query or in another CTE. Unused CTEs add complexity without benefit and should be removed."
rules.ST04.description: "Nested CASE expressions should be avoided."
rules.ST04.explanation: "Nested CASE expressions make SQL queries difficult to read and maintain. Consider refactoring the logic using CTEs, subqueries, or separate columns to improve readability."
rules.ST05.description: "Derived tables should use CTEs instead."
rules.ST05.explanation: "Subqueries in the FROM clause (derived tables) reduce readability compared to Common Table Expressions (CTEs). Consider refactoring derived tables into CTEs defined in a WITH clause."
rules.ST06.description: "Select column order convention."
rules.ST06.explanation: "Columns in a SELECT clause should follow a consistent ordering convention. For example, wildcards and simple columns before aggregate or window functions. This rule is currently a stub and does not produce violations."
rules.ST07.description: "Prefer explicit ON clause over USING clause in joins."
rules.ST07.explanation: "The USING clause in a JOIN is a shorthand for matching columns with the same name. While concise, it can be less clear than an explicit ON clause. Using ON makes the join condition explicit and avoids potential ambiguity."
rules.ST08.description: "DISTINCT used with parentheses is misleading."
rules.ST08.explanation: "DISTINCT is a keyword that applies to the entire SELECT result set, not a function. Writing SELECT DISTINCT(col) suggests DISTINCT operates on a single column like a function, which is misleading. Use SELECT DISTINCT col instead."
rules.ST09.description: "Join condition column order convention."
rules.ST09.explanation: "In a JOIN ... ON clause, the column from the table being joined should appear on the left side of the comparison for consistency and readability. This rule is currently a stub and does not produce violations."
rules.ST10.description: "WHERE clause contains a constant/tautological expression."
rules.ST10.explanation: "A WHERE clause with a constant expression like WHERE 1 = 1 or WHERE TRUE is either a placeholder that should be removed, or indicates dead code. Remove the WHERE clause or replace it with a meaningful condition."
rules.ST11.description: "Joined table is not referenced in the query."
rules.ST11.explanation: "A table that is joined but never referenced in the SELECT, WHERE, or other clauses may be unnecessary. Remove unused joins to simplify the query and improve performance. This rule is currently a stub."
rules.ST12.description: "Consecutive semicolons indicate empty statements."
rules.ST12.explanation: "Multiple consecutive semicolons with only whitespace between them indicate empty statements, which are likely unintentional. Remove the extra semicolons."

rules.RG02.description: "Consistent use of NULL in UNION."
rules.RG02.explanation: "When using NULL in a UNION query, the type of the NULL column is ambiguous."
rules.RG03.description: "Use of BETWEEN operator."
rules.RG03.explanation: "The BETWEEN operator is inclusive on both ends and can lead to subtle bugs, especially with date/time ranges. Consider using >= and < for clearer boundary semantics."
rules.RG04.description: "Use of HAVING without GROUP BY."
rules.RG04.explanation: "HAVING is designed to filter grouped results. Using HAVING without GROUP BY applies the filter to the entire result as a single group, which is confusing. Use WHERE for ungrouped filtering."
rules.RG05.description: "Subqueries in FROM clause should have an alias."
rules.RG05.explanation: "When a subquery is used as a table source in a FROM or JOIN clause, it should have an alias for readability and to allow referencing its columns."

rules.TQ01.description: "Avoid using the sp_ prefix for stored procedures."
rules.TQ01.explanation: "Stored procedures with the sp_ prefix cause SQL Server to search the master database first, leading to performance overhead and potential name collisions. Use a different prefix."
rules.TQ02.description: "IF/WHILE blocks should use BEGIN...END for multi-statement bodies."
rules.TQ02.explanation: "In T-SQL, IF and WHILE without BEGIN...END only execute the immediately following statement. This can lead to subtle bugs when adding statements. Always use BEGIN...END for clarity."
rules.TQ03.description: "Avoid empty batches (consecutive GO statements)."
rules.TQ03.explanation: "In T-SQL, GO is a batch separator. Two consecutive GO statements with nothing between them create an empty batch, which is likely unintentional."

